<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mentor - AI Trainer Assistant</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Mentor</h1>
            <p class="subtitle">AI Trainer Assistant</p>
        </div>

        <div class="input-section">
            <label for="prompt">Enter Your Question or Prompt</label>
            <textarea id="prompt" placeholder="Ask me anything..."></textarea>
            <div class="button-group">
                <button onclick="generate()" class="btn-primary">✨ Generate Response</button>
                <button onclick="generateNotes()" class="btn-secondary">📝 Generate Notes</button>
                <button onclick="generateAssignments()" class="btn-secondary">📋 Generate Assignments</button>
            </div>
        </div>

        <div class="output-section">
            <h2>Response</h2>
            <div id="output" class="output-box">Your response will appear here...</div>
        </div>
    </div>
    <script src="/frontend/script.js"></script>
</body>
</html>
